<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <!-- <Javascript bootstrap -->

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="bankapp.css">

    <title>Bank App</title>
</head>

<body>

    <div class="container mt-5">
        <h1 class="text-center">Bank App</h1>

        <div class="card p-3 text-center">
            <h4>Balance: &#8377; <span id="balance">0</span></h4>
            <input type="number" id="initial-balance" class="form-control mt-2" placeholder="Enter initial balance">
            <button class="btn btn-primary mt-2" onclick="setBalance()">Set Balance</button>
        </div>

        <div class="card p-3 mt-3">
            <input type="text" id="desc" class="form-control mb-2" placeholder="Description">
            <input type="number" id="amount" class="form-control mb-2" placeholder="Amount">

            <button class="btn btn-success" onclick="addIncome()">Add Income</button>
            <button class="btn btn-danger mt-2" onclick="addExpense()">Add Expense</button>
        </div>

        <div class="row mt-3 text-center">
            <div class="col-md-6">
                <div class="card p-3">
                    <h4>Total Incomes</h4>
                    <h3 class="text-success">&#8377; <span id="total-incomes">0</span></h3>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h4>Total Expenses</h4>
                    <h3 class="text-danger">&#8377; <span id="total-expenses">0</span></h3>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-6">
                <div class="card p-3">
                    <h4 class="text-success">Income Transactions</h4>
                    <ul id="income-list" class="list-group"></ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h4 class="text-danger">Expense Transactions</h4>
                    <ul id="expense-list" class="list-group"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="bankapp.js"></script>
</body>

</html>
