<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
      
    <!-- <Javascript bootstrap -->
    
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <title>Buttons and Jumbatron</title>
</head>
<body style="text-align: center;">
    <div class="jumbotron">
        <div class="container">
            <h1 class="display-4" style="color:brown";><b>Codingal</b></h1>
            <p>Codingal helps kid love coding </p>
        </div>
    </div>
    <div class="container mt-3">
        <h2>Buttons</h2>
        <button type="button" class="btn btn-outline-primary">Primary</button>
        <button type="button" class="btn btn-secondary btn-lg">Secondary</button>
        <button type="button" class="btn btn-success btn-block">Success</button>
        <button type="button" class="btn btn-warning active">Warning</button>
        <button type="button" class="btn btn-danger disabled">danger</button>
    </div>
    
</body>
</html>
