    <p id="result"></p>
    
    <script>

        function findSum() {
            var sum = 0;
            for (i = 0; i < arguments.length; i++) {
                if (arguments[i] + sum) {
                    sum = sum + arguments[i];
                }
            }
            return sum;
        }
        document.getElementById("result").innerHTML = "The sum of (8,4,7,9,12,10,13) is: " + findSum (8, 4, 7, 9, 12, 10, 13);
