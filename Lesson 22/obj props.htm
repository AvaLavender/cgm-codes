<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Object Properties</title>
</head>
<body>
    
    <h2>JS Object Properties</h2>
    <p>There are two different ways to access an object property</p>
    <p id="demo"></p>

    <script>
        var person={
            name: "Aavani",
            age: 13,
            percentage: 96,
        };

        document.getElementById("demo").innerHTML = person.name +" is " + person.age + " years. Percentage is " + person.percentage;
    </script>
</body>
</html>
