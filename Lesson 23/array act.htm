<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>JS Array</h2>
    <p id="demo"></p>
    <p id="demo1"></p>

    <script>

    var person = {
        name: "Aavani",
        age: 13,
        percentage: 96,
        };

    document.getElementById("demo").innerHTML = person.name + " is " + person.age + " years. Percentage is " + person.percentage;

    var fruits = ["Banana", "Orange", "Apple", "Mango"];

    document.getElementById("demo1").innerHTML = fruits.join("-");
    </script>   
</body>
</html>
