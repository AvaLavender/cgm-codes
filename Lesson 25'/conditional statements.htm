<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <p>Click the button below for a time based greeting!!</p>

    <button onclick="myFunction()">Try it now! </button>

    <p id="hour"></p>
    <p id="greet"></p>

    <script>

        function myFunction() {
            var greeting;
            var time= new Date().getHours();

            if (time < 10) {
                greeting= "Good morning!";
            }
            else if (time < 20)
                 greeting= "Good Day!";
            else {
                greeting="Good evening!"
            }

            document.getElementById("hour").innerHTML="current hour is: "+ time;
            document.getElementById("greet").innerHTML = greeting;
        
        }
    </script>
</body>
</html>
